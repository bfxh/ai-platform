[loggers]
keys=root,mcp_core,skills

[handlers]
keys=consoleHandler,fileHandler,jsonHandler

[formatters]
keys=coloredFormatter,standardFormatter,jsonFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler,jsonHandler

[logger_mcp_core]
level=DEBUG
handlers=consoleHandler,fileHandler,jsonHandler
qualname=mcp_core
propagate=0

[logger_skills]
level=DEBUG
handlers=consoleHandler,fileHandler,jsonHandler
qualname=skills
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=coloredFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=standardFormatter
args=('logs/mcp_core.log', 'a', 10485760, 5)

[handler_jsonHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=('logs/mcp_core.json.log', 'a', 10485760, 5)

[formatter_coloredFormatter]
class=logging_config.ColoredFormatter
format=%(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)d)
datefmt=%Y-%m-%d %H:%M:%S

[formatter_standardFormatter]
format=%(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)d)
datefmt=%Y-%m-%d %H:%M:%S

[formatter_jsonFormatter]
class=logging_config.StructuredFormatter
