[[skills]]
name = "self-evolving-agent"
path = "skills/self-evolving-agent"

[[skills]]
name = "mcp-second-brain"
path = "skills/mcp-second-brain"

[[skills]]
name = "web-content-reach"
path = "skills/web-content-reach"

[[skills]]
name = "local-llm-engine"
path = "skills/local-llm-engine"

[[skills]]
